[tool.ruff]
# Target python version 13
target-version = "py313"

# backend check
src = ["backend"]

line-length = 80

exclude = [
    "*/migrations/*",
    ".git",
    "__pycache__",
    ".ruff_cache",
    ".venv",
    "venv",
]

[tool.ruff.lint]

select = ["E", "W", "F", "I", "UP", "B", "SIM", "DJ"]

ignore = [
    "E501",
    "DJ001"
]

[tool.ruff.lint.per-file-ignores]
"backend/config/settings/*.py" = ["F403", "F405"]

[tool.ruff.lint.isort]

known-first-party = ["apps", "config"]

[tool.ruff.format]
# Use double quotes
quote-style = "double"

skip-magic-trailing-comma = false

[tool.coverage.run]

source = ["backend/apps"]

omit = [
    "*/migrations/*",
    "*/tests/*",
    "*/__init__.py",
    "*/admin.py",
]

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "config.settings.dev"
testpaths = ["backend"]
python_files = ["tests.py", "test_*.py", "*_tests.py"]

addopts = "-v --tb=short --cov=apps --cov-report=term-missing --cov-report=xml:coverage.xml"

[tool.coverage.report]

exclude_lines = [
    "pragma: no cover",
    "if TYPE_CHECKING:",
    "def __repr__",
    "def __str__",
]

# fail CI if coverage drops below threshold
# fail_under = 80

show_missing = true
