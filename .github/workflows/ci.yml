name: CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format backend/ --check

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vybe_test
          POSTGRES_USER: vybe_user
          POSTGRES_PASSWORD: vybe_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vybe_user -d vybe_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: vybe_minio_admin
          MINIO_ROOT_PASSWORD: vybe_minio_secret
        ports:
          - 9000:9000
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_DB: vybe_test
      POSTGRES_USER: vybe_user
      POSTGRES_PASSWORD: vybe_test_password
      POSTGRES_HOST: localhost
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: test_mRbwzLYDDwQtfZQWDiswHrvr9g_dTSzRvUtD0rRqj_dgGJa93EMR0LzSh0AGV1jRX8I
      DEBUG: "True"
      AWS_ACCESS_KEY_ID: vybe_minio_admin
      AWS_SECRET_ACCESS_KEY: vybe_minio_secret
      AWS_STORAGE_BUCKET_NAME: vybe-media
      AWS_S3_REGION_NAME: us-east-1
      AWS_S3_ENDPOINT_URL: http://minio:9000
      AWS_S3_EXTERNAL_URL: http://localhost:9000

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install -r backend/requirements-dev.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Create S3 bucket in MinIO
        run: |
          pip install boto3
          python scripts/create_bucket.py
        env:
          PYTHONPATH: backend

      - name: Run tests with coverage
        working-directory: backend
        run:  pytest --cov=apps --cov-report=term-missing --cov-report=xml:coverage.xml

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: backend/coverage.xml
          fail_ci_if_error: false
          flags: unittests
