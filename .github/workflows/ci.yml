name: CI

on:
  push:
    branches: [ main ]

  pull_request:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff lint check
        run: ruff check backend/

      - name: Ruff format check
        run: ruff format backend/ --check

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vybe_test
          POSTGRES_USER: vybe_user
          POSTGRES_PASSWORD: vybe_test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vybe_user -d vybe_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DJANGO_SETTINGS_MODULE: config.settings.dev
      POSTGRES_DB: vybe_test
      POSTGRES_USER: vybe_user
      POSTGRES_PASSWORD: vybe_test_password
      POSTGRES_HOST: localhost
      REDIS_URL: redis://localhost:6379/0
      DJANGO_SECRET_KEY: test_mRbwzLYDDwQtfZQWDiswHrvr9g_dTSzRvUtD0rRqj_dgGJa93EMR0LzSh0AGV1jRX8I
      DEBUG: "True"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-django

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Run tests
        working-directory: backend
        run: pytest -v --tb=short || test $? -eq 5
